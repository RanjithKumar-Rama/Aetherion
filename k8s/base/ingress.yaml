apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherion
  namespace: aetherion
  labels:
    app.kubernetes.io/name: aetherion
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: aetherion.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aetherion
                port:
                  name: http
