apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Standard Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Pods must carry app.kubernetes.io/name and app.kubernetes.io/version labels
      to enable consistent monitoring and policy targeting.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-labels
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - aetherion
      validate:
        message: "Pods must have labels: app.kubernetes.io/name and app.kubernetes.io/version."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              app.kubernetes.io/version: "?*"
