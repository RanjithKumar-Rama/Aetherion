apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aetherion-allow-ingress
  namespace: aetherion
  labels:
    app.kubernetes.io/name: aetherion
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aetherion
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # allow traffic from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
    # allow prometheus to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8080
  egress:
    # allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
