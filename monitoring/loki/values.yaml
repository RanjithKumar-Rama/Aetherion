loki:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
  config:
    schema_config:
      configs:
        - from: "2024-01-01"
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/index
        cache_location: /data/loki/boltdb-cache
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

# grafana enabled, ofcourse
grafana:
  enabled: false
