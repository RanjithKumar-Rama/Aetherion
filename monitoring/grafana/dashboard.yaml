apiVersion: v1
kind: ConfigMap
metadata:
  name: aetherion-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  aetherion.json: |
    {
      "title": "Aetherion Service",
      "uid": "aetherion-svc",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"aetherion\"}[5m])) by (endpoint)",
              "legendFormat": "{{ endpoint }}"
            }
          ]
        },
        {
          "id": 2,
          "title": "5xx Error Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(http_requests_total{namespace=\"aetherion\", http_status=~\"5..\"}[5m])) by (endpoint)",
              "legendFormat": "{{ endpoint }}"
            }
          ]
        },
        {
          "id": 3,
          "title": "P99 Latency (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"aetherion\"}[5m])) by (le, endpoint))",
              "legendFormat": "p99 {{ endpoint }}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Memory Working Set (bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"aetherion\", container=\"aetherion\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 5,
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "datasource": { "type": "prometheus" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"aetherion\", container=\"aetherion\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Logs",
          "type": "logs",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "{namespace=\"aetherion\", app_kubernetes_io_name=\"aetherion\"}",
              "legendFormat": ""
            }
          ]
        }
      ]
    }
